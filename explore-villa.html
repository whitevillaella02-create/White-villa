<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinnamon & Nature Escape</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  text-align:center;
}

/* HEADER */
.header{
  background:#0f2027;
  color:white;
  padding:15px;
}

/* BOX DESIGN */
.box{
  margin:20px;
  padding:5px;
  border-radius:15px;
  background:linear-gradient(45deg, green, orange, yellow, red);
}

.inner{
  background:white;
  border-radius:12px;
  padding:15px;
}

/* GRID PHOTOS */
.grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
}

img{
  width:100%;
  border-radius:10px;
}

/* VIDEOS */
video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* BACK BUTTON */
.back-btn{
  display:inline-block;
  margin:20px;
  padding:10px 20px;
  background:#ff9800;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h2>🌿 Cinnamon & Nature Escape</h2>
  <p>Relax & Enjoy Nature</p>
</div>

<!-- 🎥 VIDEO SECTION -->
<div class="box">
  <div class="inner">
    <h3>🎥 Videos</h3>

    <!-- VIDEO 1 -->
    <video controls>
      <source src="video1.mp4" type="video/mp4">
    </video>

    <!-- VIDEO 2 -->
    <video controls>
      <source src="video2.mp4" type="video/mp4">
    </video>

  </div>
</div>

<!-- 📸 PHOTO SECTION -->
<div class="box">
  <div class="inner">
    <h3>📸 Photo Gallery</h3>

    <div class="grid">
      <img src="img1.jpg">
      <img src="img2.jpg">
      <img src="img3.jpg">
      <img src="img4.jpg">
      <img src="img5.jpg">
      <img src="img6.jpg">
    </div>

  </div>
</div>

<!-- 🔙 BACK -->
<a href="index.html" class="back-btn">⬅ Back to Home</a>

</body>
</html>
