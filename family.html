<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Room</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5;}

img{
  width:90%;
  border-radius:10px;
  margin-top:10px;
}

input{
  width:90%;
  padding:10px;
  margin:8px;
  border-radius:5px;
  border:1px solid #ccc;
}

.btn{
  padding:10px 20px;
  background:#ff9800;
  color:white;
  border:none;
  border-radius:5px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Family Room With Mountain View</h2>

<img src="IMG-20260412-WA0083.jpg">
<img src="IMG-20260412-WA0084.jpg">
<img src="IMG-20260412-WA0085.jpg">
<img src="IMG-20260412-WA0086.jpg">
<img src="IMG-20260412-WA0087.jpg">

<!-- FORM -->
<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="nic" placeholder="NIC / Passport No">
<input type="text" id="phone" placeholder="Contact Number">

<input type="date" id="checkin">
<input type="date" id="checkout">

<input type="number" id="nights" placeholder="How many nights">
<input type="number" id="guests" placeholder="How many guests">

<button class="btn" onclick="sendWhatsApp()">ORDER NOW</button>

<script>
function sendWhatsApp(){

let name = document.getElementById("name").value;
let nic = document.getElementById("nic").value;
let phone = document.getElementById("phone").value;
let checkin = document.getElementById("checkin").value;
let checkout = document.getElementById("checkout").value;
let nights = document.getElementById("nights").value;
let guests = document.getElementById("guests").value;

let message = `Room Booking:
Room: Family Room With Mountain View

Customer Name: ${name}
NIC/Passport: ${nic}
Contact Number: ${phone}

Check-in Date: ${checkin}
Check-out Date: ${checkout}

Nights: ${nights}
Guests: ${guests}`;

let url = "https://wa.me/94703584922?text=" + encodeURIComponent(message);

window.open(url);
}
</script>

</body>
</html>
