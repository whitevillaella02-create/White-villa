<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel white villa </title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* Header */
.header{
  background:#0f2027;
  color:white;
  padding:15px;
  text-align:center;
}

/* Hero Section */
.hero{
  height:300px;
  background:url("hotel.jpg");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:30px;
  font-weight:bold;
}

/* Sections */
.section{
  padding:20px;
  text-align:center;
}

/* Cards */
.card{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Button */
.btn{
  display:inline-block;
  padding:10px 20px;
  background:#ff9800;
  color:white;
  text-decoration:none;
  border-radius:5px;
}

/* Footer */
.footer{
  background:#0f2027;
  color:white;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🏨 HOTEL KAVIYA</h1>
</div>

<div class="hero">
  Welcome to Luxury Stay
</div>

<div class="section">
  <h2>Our Rooms</h2>
  
  <div class="card">
    <h3>Standard Room</h3>
    <p>Comfortable room with AC & WiFi</p>
    <p>Rs. 5000 / Night</p>
  </div>

  <div class="card">
    <h3>Deluxe Room</h3>
    <p>Luxury room with pool view</p>
    <p>Rs. 9000 / Night</p>
  </div>
</div>

<div class="section">
  <h2>Services</h2>
  <p>🍽 Restaurant | 🏊 Pool | 📶 Free WiFi</p>
</div>

<div class="section">
  <h2>Contact Us</h2>
  <a class="btn" href="https://wa.me/9477384759">WhatsApp Now</a>
</div>

<div class="footer">
  © 2026 Hotel Kaviya
</div>

</body>
</html>
