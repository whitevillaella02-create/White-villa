<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>White Villa Hotel</title>

<!-- WhatsApp Preview -->
<meta property="og:title" content="White Villa Hotel">
<meta property="og:description" content="Luxury rooms | Pool | Free WiFi">
<meta property="og:image" content="https://whitevillaella02-create.github.io/White-villa/villa.jpg">
<meta property="og:url" content="https://whitevillaella02-create.github.io/White-villa/">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* Header */
.header{
  background:#0f2027;
  color:white;
  padding:15px;
  text-align:center;
}

/* Logo */
.logo{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:50%;
  margin-top:10px;
  border:2px solid white;
}

/* Hero Section */
.hero{
  height:300px;
  background:url("IMG-20260412-WA0081.jpg");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-size:20px;
  font-weight:bold;
  text-shadow:1px 1px 3px white;
}

/* Sections */
.section{
  padding:20px;
  text-align:center;
}

/* Cards */
.card{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Button */
.btn{
  display:inline-block;
  padding:10px 20px;
  background:#ff9800;
  color:white;
  text-decoration:none;
  border-radius:5px;
}

/* Footer */
.footer{
  background:#0f2027;
  color:white;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🏨 WHITE VILLA HOTEL</h1>

  <!-- LOGO IMAGE -->
  <img class="logo" src="villa.jpg" alt="Hotel Logo">
</div>

<div class="hero">
  Welcome to White Villa
</div>

<div class="section">
  <h2>Our Rooms</h2>
  
  <div class="card">
    <h3>Standard Room</h3>
    <p>Comfortable room with AC & WiFi</p>
    <p>Rs. 5000 / Night</p>
  </div>

  <div class="card">
    <h3>Deluxe Room</h3>
    <p>Luxury room with pool view</p>
    <p>Rs. 9000 / Night</p>
  </div>
</div>

<div class="section">
  <h2>Services</h2>
  <p>🍽 Restaurant | 🏊 Pool | 📶 Free WiFi</p>
</div>

<div class="section">
  <h2>Contact Us</h2>
  <a class="btn" href="https://wa.me/9477384759">WhatsApp Now</a>
</div>

<div class="footer">
  © 2026 White Villa Hotel
</div>

</body>
</html>
