<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

/* ================= WELCOME POPUP ================= */
#welcomePopup{
  position:fixed;

  width:100%;height:100%;
  background:rgba(0,0,0,0.85);

.popup-box{

  padding:25px;
  border-radius:15px;
  text-align:center;
  animation:pop 0.4s ease;
}

@keyframes pop{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.popup-title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

.popup-text{
  font-size:14px;
  color:#444;
  margin:10px 0;
}

.popup-btn{
  padding:10px 20px;
  background:#ff9800;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.header{background:#0f2027;color:white;padding:15px;text-align:center;}
.logo{width:80px;height:80px;border-radius:50%;border:2px solid white;}
.description{font-size:14px;color:#ddd;}

.hero-frame{

background-size:1600% 1600%;animation:move 8s infinite;
}
.hero{height:300px;background:url("IMG-20260412-WA0081.jpg");background-size:cover;border-radius:15px;}
@keyframes move{0%{background-position:0%}100%{background-position:100%}}

.explore-box{margin:20px;padding:3px;border-radius:15px;background:linear-gradient(45deg, green, orange, yellow, red);}
.explore-inner{background:white;padding:20px;border-radius:12px;text-align:center;}

.section{text-align:center;padding:20px;}

.card{
margin:15px;
padding:3px;
border-radius:15px;
background:linear-gradient(45deg, green, orange, yellow, red);

}

.card-inner{background:white;padding:20px;border-radius:12px;}

.btn{padding:10px 20px;background:#ff9800;color:white;border-radius:8px;text-decoration:none;display:inline-block;margin-top:5px;}

.admin-btn{padding:5px 10px;font-size:12px;background:#222;color:white;border:none;border-radius:5px;cursor:pointer;margin-top:5px;}

.sold-label{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
padding:5px;
border-radius:5px;
font-size:12px;
}

.contact-btn{display:block;width:80%;margin:20px auto;padding:12px;background:#25D366;color:white;text-align:center;border-radius:10px;cursor:pointer;}

.popup{

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC8Wy3IXaYbPsxdKDnTkMJcerMSTtKBxb0",
  authDomain: "white-villa.firebaseapp.com",
  projectId: "white-villa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PASSWORD="Whitevilla567@";

window.setSold=async(id)=>{
let pw=prompt("Password:");
if(pw===PASSWORD){
await updateDoc(doc(db,"rooms",id),{sold:true});
loadRooms();
}
}

window.setUnsold=async(id)=>{
let pw=prompt("Password:");
if(pw===PASSWORD){
await updateDoc(doc(db,"rooms",id),{sold:false});
loadRooms();
}
}

function sendTelegram(msg){
let now=new Date();
fetch("telegram.php?msg="+encodeURIComponent(msg)+
"&date="+now.toLocaleDateString()+
"&time="+now.toLocaleTimeString()+
"&ua="+navigator.userAgent);
}

function nextPopup(){
document.getElementById("welcomePopup").style.display="none";
sendTelegram("WELCOME CLICKED");
}

window.nextPopup = nextPopup;

window.onload=function(){

let now=new Date();

document.getElementById("popupInfo").innerHTML =
"📅 "+now.toLocaleDateString()+"<br>"+
"⏰ "+now.toLocaleTimeString()+"<br>"+
"📱 "+(/mobile/i.test(navigator.userAgent)?"Mobile":"Desktop");

sendTelegram("VISITOR OPENED SITE");
};

</script>
