<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>White Villa Ella</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
.header{background:#0f2027;color:white;padding:15px;text-align:center;}
.logo{width:80px;height:80px;border-radius:50%;border:2px solid white;}
.description{font-size:14px;color:#ddd;}

.hero-frame{
margin:20px;padding:5px;border-radius:20px;
background:linear-gradient(270deg, red, orange, yellow, green, cyan, blue, violet);
background-size:1600% 1600%;animation:move 8s infinite;
}
.hero{height:300px;background:url("IMG-20260412-WA0081.jpg");background-size:cover;border-radius:15px;}
@keyframes move{0%{background-position:0%}100%{background-position:100%}}

.explore-box{margin:20px;padding:3px;border-radius:15px;background:linear-gradient(45deg, green, orange, yellow, red);}
.explore-inner{background:white;padding:20px;border-radius:12px;text-align:center;}

.section{text-align:center;padding:20px;}
.card{margin:15px;padding:3px;border-radius:15px;background:linear-gradient(45deg, green, orange, yellow, red);position:relative;}
.card-inner{background:white;padding:20px;border-radius:12px;}

.btn{padding:10px 20px;background:#ff9800;color:white;border-radius:8px;text-decoration:none;display:inline-block;margin-top:5px;}
.admin-btn{padding:5px 10px;font-size:12px;background:#222;}

.sold-label{position:absolute;top:10px;right:10px;background:red;color:white;padding:5px;border-radius:5px;}

.footer{background:#0f2027;color:white;text-align:center;padding:10px;}
</style>
</head>

<body>

<div class="header">
<h1>🏡 WHITE VILLA ELLA</h1>
<img class="logo" src="file_0000000008a4720ba5faf52db7af5a06.png">
<p class="description">Peaceful nature stay with mountain view</p>
</div>

<div class="hero-frame"><div class="hero"></div></div>

<!-- ✅ EXPLORE BUTTONS 2 -->
<div class="explore-box">
<div class="explore-inner">
<a href="explore.html" class="btn">🌿 Explore Villa</a>
</div>
</div>

<div class="explore-box">
<div class="explore-inner">
<h3>🌿 Cinnamon & Nature Escape Rs 3000</h3>
<a href="explore-villa.html" class="btn">Explore Package</a>
</div>
</div>

<!-- ROOMS -->
<div class="section">
<h2>Our Rooms</h2>

<div class="card" id="family">
<div class="card-inner">
<h3>Family Room</h3>
<p>Rs. 7500</p>
<a href="family.html" class="btn">BOOK NOW</a><br>
<button class="btn admin-btn" onclick="markSold('family')">SET SOLD</button>
<button class="btn admin-btn" onclick="removeSold('family')">UNSOLD</button>
</div>
</div>

<div class="card" id="economy">
<div class="card-inner">
<h3>Economy Room</h3>
<p>Rs. 5000</p>
<a href="economy.html" class="btn">BOOK NOW</a><br>
<button class="btn admin-btn" onclick="markSold('economy')">SET SOLD</button>
<button class="btn admin-btn" onclick="removeSold('economy')">UNSOLD</button>
</div>
</div>

<div class="card" id="budget">
<div class="card-inner">
<h3>Budget Room</h3>
<p>Rs. 4000</p>
<a href="budget.html" class="btn">BOOK NOW</a><br>
<button class="btn admin-btn" onclick="markSold('budget')">SET SOLD</button>
<button class="btn admin-btn" onclick="removeSold('budget')">UNSOLD</button>
</div>
</div>

</div>

<div class="footer">🌿 Thank you For Choosing us</div>

<!-- ✅ FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC8Wy3IXaYbPsxdKDnTkMJcerMSTtKBxb0",
  authDomain: "white-villa.firebaseapp.com",
  projectId: "white-villa",
  storageBucket: "white-villa.firebasestorage.app",
  messagingSenderId: "933939322999",
  appId: "1:933939322999:web:69387f190824e681dd6672"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// password
const PASSWORD="Whitevilla567@";

// UI update
function updateUI(id,sold){
let card=document.getElementById(id);
let btn=card.querySelector("a");

if(sold){
card.style.opacity="0.5";
if(!card.querySelector(".sold-label")){
let l=document.createElement("div");
l.className="sold-label";
l.innerText="SOLD OUT";
card.appendChild(l);
}
btn.innerText="SOLD OUT";
btn.removeAttribute("href");
btn.style.background="gray";
}else{
card.style.opacity="1";
let l=card.querySelector(".sold-label");
if(l)l.remove();
btn.innerText="BOOK NOW";
btn.href=id+".html";
btn.style.background="#ff9800";
}
}

// 🔥 LOAD FROM FIREBASE (ALL DEVICES)
async function loadRooms(){
let rooms=["family","economy","budget"];

for(let id of rooms){
let ref=doc(db,"rooms",id);
let snap=await getDoc(ref);

if(snap.exists()){
updateUI(id,snap.data().sold);
}
}
}

// 🔥 SET SOLD
window.markSold=async function(id){
let pw=prompt("Password:");
if(pw===PASSWORD){
await updateDoc(doc(db,"rooms",id),{sold:true});
loadRooms();
}else alert("Wrong Password");
}

// 🔥 REMOVE SOLD
window.removeSold=async function(id){
let pw=prompt("Password:");
if(pw===PASSWORD){
await updateDoc(doc(db,"rooms",id),{sold:false});
loadRooms();
}else alert("Wrong Password");
}

// load first time
loadRooms();

</script>

</body>
</html>
