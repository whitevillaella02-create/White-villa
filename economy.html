<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economy Room</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5;}
img{width:90%;border-radius:10px;margin-top:10px;}
input{width:90%;padding:10px;margin:8px;border-radius:5px;border:1px solid #ccc;}
.btn{padding:10px 20px;background:#ff9800;color:white;border:none;border-radius:5px;}
</style>
</head>

<body>

<h2>Economy Double Room</h2>

<img src="eco1.jpg">
<img src="eco2.jpg">
<img src="eco3.jpg">
<img src="eco4.jpg">
<img src="eco5.jpg">

<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="nic" placeholder="NIC / Passport No">
<input type="text" id="phone" placeholder="Contact Number">

<button class="btn" onclick="sendWhatsApp()">ORDER NOW</button>

<script>
function sendWhatsApp(){
let name=document.getElementById("name").value;
let nic=document.getElementById("nic").value;
let phone=document.getElementById("phone").value;

let message=`Room Booking:
Room: Economy Room
Name: ${name}
NIC: ${nic}
Contact: ${phone}`;

let url="https://wa.me/94703584922?text="+encodeURIComponent(message);
window.open(url);
}
</script>

</body>
</html>
